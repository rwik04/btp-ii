experiment_name: btp-ii-default
output_dir: results
dataset: wwbrannon/twinviews-13k
n_topics: null

retrieval:
  N: 20
  k: 6
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  use_modal: true
  use_preprocessed_corpus: true
  use_embedding_cache: true
  embedding_cache_dir: data/cache
  reindex_qdrant_on_eval: false

lfgd:
  alpha: 0.5
  tau: 0.05

llm:
  # LLM cache controls:
  # - use_cache=false: always call LLMs (strictest model comparison, slowest)
  # - cache_scope=per_model: fast, but isolates caches per synth/judge model config
  # - cache_scope=shared: one cache file reused across all model configs
  use_cache: true
  cache_scope: per_model
  cache_path: data/cache/llm_eval_cache.json

  # Synthesis models
  synth_model: 
  #llama-3.3-70b-versatile
  #qwen/qwen3-32b
  #openai/gpt-oss-20b
  #openai/gpt-oss-120b
  #gpt-5.4-mini
  synth_provider: groq #openai
  synth_reasoning_effort: low

  # Judge model
  judge_model: gpt-5.4-mini
  judge_provider: openai
  judge_reasoning_effort: low

systems:
  - lfgd
